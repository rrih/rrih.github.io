name: Growth Autopilot PR

on:
  workflow_run:
    workflows: ['Weekly Growth Metrics']
    types: [completed]
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  safe-growth-pr:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Apply safe growth actions
        run: bun scripts/growth/safe-growth-actions.ts

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Find latest growth issue
        if: steps.changes.outputs.changed == 'true'
        id: latest_issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.issues.listForRepo({
              ...context.repo,
              labels: 'growth',
              state: 'open',
              per_page: 10,
              sort: 'created',
              direction: 'desc',
            })
            const issue = data.find((item) => !item.pull_request)
            core.setOutput('number', issue ? String(issue.number) : '')
            core.setOutput('reference', issue ? `#${issue.number}` : 'the latest growth issue')

      - name: Validate proposed changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          bun run lint
          bun --bun tsc --noEmit
          bun test
          bun run build

      - name: Restore validation artifacts
        if: steps.changes.outputs.changed == 'true'
        run: |
          git restore public/og public/sitemap.xml public/sw.js
          git diff --name-only

      - name: Create growth PR
        id: cpr
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/growth-autopilot
          delete-branch: true
          add-paths: |
            src/config/tool-related-links.ts
          title: 'fix: strengthen growth internal links'
          commit-message: 'fix: strengthen growth internal links'
          labels: growth
          body: |
            Automated safe growth PR.

            Action selected from `docs/growth/playbooks/weekly-review.md`:
            - Bottom-up action 3: strengthen internal links around high-impression tool pages.

            Guardrails:
            - No ad density changes.
            - No generated article/content batch.
            - Automatically merged only when the PR changes `src/config/tool-related-links.ts`.

            References ${{ steps.latest_issue.outputs.reference }}

      - name: Verify autopilot PR guardrails
        if: steps.changes.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          changed_files="$(gh pr view "$PR_NUMBER" --json files --jq '.files[].path')"
          head_ref="$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')"

          echo "PR #$PR_NUMBER head: $head_ref"
          echo "Changed files:"
          echo "$changed_files"

          if [ "$head_ref" != "codex/growth-autopilot" ]; then
            echo "Unexpected PR branch: $head_ref"
            exit 1
          fi

          if [ "$changed_files" != "src/config/tool-related-links.ts" ]; then
            echo "Automerge blocked: only src/config/tool-related-links.ts may change."
            exit 1
          fi

      - name: Auto-merge safe growth PR
        if: steps.changes.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --squash \
            --delete-branch \
            --subject "fix: strengthen growth internal links" \
            --body "Automated safe growth merge after validation and allowlist checks."

      - name: Deploy merged growth change
        if: steps.changes.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main

      - name: Comment on growth issue
        if: steps.changes.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != '' && steps.latest_issue.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.latest_issue.outputs.number }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Growth autopilot merged PR #$PR_NUMBER after validation and allowlist checks. Deploy workflow was dispatched for main."
