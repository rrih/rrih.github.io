name: Weekly Growth Metrics

on:
  schedule:
    # Every Monday 00:00 UTC (09:00 JST)
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  collect-and-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Fetch GSC / GA4 metrics
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: bun scripts/growth/fetch-metrics.ts

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/growth
          if git diff --cached --quiet; then
            echo "No metric changes to commit"
          else
            git commit -m "chore: weekly growth metrics snapshot"
            git push
          fi

      - name: Open weekly review issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const dir = 'data/growth/reports'
            const latest = fs.readdirSync(dir).filter((f) => f.endsWith('.md')).sort().pop()
            if (!latest) {
              core.setFailed('No growth report found')
              return
            }
            const report = fs.readFileSync(`${dir}/${latest}`, 'utf8')
            try {
              await github.rest.issues.createLabel({
                ...context.repo,
                name: 'growth',
                color: '0066cc',
                description: 'AdSense growth program',
              })
            } catch (e) {
              // label already exists
            }
            const body = [
              'Automated weekly growth review. An AI agent (Codex / Claude Code) or a human should:',
              '',
              '1. Read this report and `data/growth/metrics/latest.json`.',
              '2. Follow `docs/growth/playbooks/weekly-review.md` to pick 1-3 improvement actions.',
              '3. Implement them as a PR referencing this issue.',
              '',
              '---',
              '',
              report,
            ].join('\n')
            await github.rest.issues.create({
              ...context.repo,
              title: `Weekly growth review ${latest.replace('.md', '')}`,
              labels: ['growth'],
              body,
            })
