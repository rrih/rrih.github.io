name: Weekly Growth Metrics

on:
  schedule:
    # Every Monday 00:00 UTC (09:00 JST)
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  collect-and-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Fetch GSC / GA4 metrics
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: bun scripts/growth/fetch-metrics.ts

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/growth
          if git diff --cached --quiet; then
            echo "No metric changes to commit"
          else
            git commit -m "chore: weekly growth metrics snapshot"
            git push
          fi

      - name: Open weekly review issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          REPORT="data/growth/reports/${TODAY}.md"
          gh label create growth --color 0066cc --description "AdSense growth program" --force
          {
            echo "Automated weekly growth review. An AI agent (Codex / Claude Code) or a human should:"
            echo ""
            echo "1. Read this report and \`data/growth/metrics/latest.json\`."
            echo "2. Follow \`docs/growth/playbooks/weekly-review.md\` to pick 1-3 improvement actions."
            echo "3. Implement them as a PR referencing this issue."
            echo ""
            echo "---"
            echo ""
            cat "$REPORT"
          } > /tmp/issue-body.md
          gh issue create \
            --title "Weekly growth review ${TODAY}" \
            --label growth \
            --body-file /tmp/issue-body.md
