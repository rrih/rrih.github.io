name: Revenue Accelerator

on:
  schedule:
    # Every day 01:00 UTC (10:00 JST)
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: write

jobs:
  plan-next-revenue-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Refresh metrics
        continue-on-error: true
        env:
          GOOGLE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS }}
          GOOGLE_QUOTA_PROJECT_ID: ro1-dev
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: bun scripts/growth/fetch-metrics.ts

      - name: Build revenue accelerator plan
        run: bun scripts/growth/revenue-accelerator.ts

      - name: Commit accelerator data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/growth
          if git diff --cached --quiet; then
            echo "No accelerator data changes to commit"
          else
            git commit -m "chore: revenue accelerator snapshot"
            git push
          fi

      - name: Update accelerator control issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const report = fs.readFileSync('data/growth/accelerator/latest.md', 'utf8')
            const title = 'Revenue accelerator control tower'
            try {
              await github.rest.issues.createLabel({
                ...context.repo,
                name: 'revenue-accelerator',
                color: 'cc6600',
                description: 'High-impact rrih.github.io revenue acceleration',
              })
            } catch (e) {
              // label already exists
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo,
              labels: 'revenue-accelerator',
              state: 'open',
              per_page: 10,
            })
            const issue = issues.find((item) => item.title === title && !item.pull_request)
            const body = [
              'Daily rrih.github.io revenue acceleration report.',
              '',
              'Codex Automation should use this issue plus `data/growth/accelerator/latest.json` to pick the next high-impact implementation.',
              '',
              '---',
              '',
              report,
            ].join('\n')

            if (issue) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body,
              })
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title,
                labels: ['growth', 'revenue-accelerator'],
                body,
              })
            }

      - name: Run safe growth autopilot
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run growth-autopilot.yml --ref main
